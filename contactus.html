<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Nerswn Dewry</title>

<!-- EmailJS CDN -->
<script src="email.min.js"></script>
<script src="rightclickdisable.js"></script>
<script src="rightclickdisabled.js"></script>
<link rel="stylesheet" href="smooth-scroll.css"> <!-- ✅ Link to SMOOTH SCROLL CSS -->
<link rel="stylesheet" href="footer.css">
<link rel="stylesheet" href="xyz.css">
<script src="all-script.js"></script>
<link rel="canonical" href="all-css.css" />
<script src="code-view-block.js"></script>
<script src="aos.js"></script>
<style>

/* ===== Animated Gradient Background ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #667eea, #764ba2, #52b3c9, #2193b0);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Gradient Animation */
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* ===== Glass Form ===== */
.bb-contact-form {
    width: 90%;
    max-width: 420px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: #fff;
}

/* Labels */
.bb-contact-form label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
}

/* Inputs */
.bb-contact-form input,
.bb-contact-form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.25);
    color: #fff;
}

.bb-contact-form input::placeholder,
.bb-contact-form textarea::placeholder {
    color: #eee;
}

/* Button */
.bb-contact-form button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #ffffff;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.bb-contact-form button:hover {
    transform: scale(1.05);
}

/* ===== Popup ===== */
.popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    width: 300px;
}

.popup-content button {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    background: #28a745;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
}

</style>
</head>

<body>

<form id="contact-form" class="bb-contact-form">

    <label>Name ⁕</label>
    <input type="text" name="Name" placeholder="Enter Your Full Name" required>

    <label>Email ⁕</label>
    <input type="email" name="Email" placeholder="Enter Your Email" required>

    <label>Phone ⁕</label>
    <input type="tel" name="Phone" placeholder="Enter Your Phone Number" required pattern="[0-9]{10,15}">

    <label>Subject ⁕</label>
    <input type="text" name="Subject" placeholder="Enter Subject" required>

    <label>Message ⁕</label>
    <textarea name="Message" rows="5" placeholder="Enter Your Message" required></textarea>

    <button type="submit">Send Message</button>

</form>

<!-- Success Popup -->
<div id="success-popup" class="popup">
    <div class="popup-content">
        <p>✅ Message Sent Successfully!</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
(function(){
    emailjs.init("36lNGedG1FFgmj7jo");
})();

document.getElementById("contact-form").addEventListener("submit", function(event){
    event.preventDefault();

    emailjs.sendForm(
        "service_flmoveq",
        "template_spnckso",
        this
    ).then(function(){
        document.getElementById("success-popup").style.display = "flex";
        document.getElementById("contact-form").reset();
    }, function(error){
        alert("Failed to send message. Please try again.");
        console.log(error);
    });
});

function closePopup(){
    document.getElementById("success-popup").style.display = "none";
}
</script>




</body>
</html>
